name: pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'llms.txt'
      - 'AGENTS.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r docs/* _site/
          # Surface the machine-readable index and agent guide on the site too.
          cp llms.txt _site/llms.txt
          cp AGENTS.md _site/AGENTS.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
